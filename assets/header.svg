<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" role="img" aria-label="Marlon Tecotl — Applied AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="1" stop-color="#0E171A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.15" r="0.85">
      <stop offset="0" stop-color="#0E7C86" stop-opacity="0.40"/>
      <stop offset="0.6" stop-color="#0E7C86" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0E7C86" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0E7C86" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#3FD0C9" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0E7C86" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="300" fill="url(#bg)"/>
  <rect width="1280" height="300" fill="url(#glow)"/>
  <rect x="0" y="0" width="1280" height="1.5" fill="url(#hair)"/>

  <text x="72" y="118" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" fill="#F5F7FA" font-size="52" font-weight="700" letter-spacing="-1">Marlon Tecotl</text>
  <text x="74" y="158" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#5FB8BE" font-size="17" letter-spacing="3">APPLIED AI ENGINEER</text>
  <text x="74" y="206" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" fill="#9BB0BC" font-size="20">I design and ship production LLM systems — guardrailed, traceable,</text>
  <text x="74" y="234" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" fill="#9BB0BC" font-size="20">human-in-the-loop — with real MLOps on AWS.</text>

  <!-- subtle agent/graph motif, top-right -->
  <g transform="translate(1015,150)" opacity="0.9">
    <line x1="18" y1="0" x2="105" y2="-58" stroke="#204A50" stroke-width="1.5"/>
    <line x1="18" y1="0" x2="105" y2="58" stroke="#204A50" stroke-width="1.5"/>
    <line x1="123" y1="-58" x2="210" y2="0" stroke="#204A50" stroke-width="1.5"/>
    <line x1="123" y1="58" x2="210" y2="0" stroke="#204A50" stroke-width="1.5"/>
    <circle cx="18" cy="0" r="8" fill="#0E7C86"/>
    <circle cx="114" cy="-58" r="7" fill="#173037" stroke="#3FD0C9" stroke-width="1.5"/>
    <circle cx="114" cy="58" r="7" fill="#173037" stroke="#3FD0C9" stroke-width="1.5"/>
    <circle cx="210" cy="0" r="10" fill="#0E7C86" stroke="#3FD0C9" stroke-width="1.5"/>
    <path d="M205 0 l3.5 3.5 l6 -7" fill="none" stroke="#EAFBFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="74" y="270" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#5B7681" font-size="13" letter-spacing="1.5">LangGraph · OpenAI · AWS · FastAPI · Terraform · fintech &amp; regulated AI</text>
